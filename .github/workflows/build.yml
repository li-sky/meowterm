name: Build Electron App

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Package (Make)
        run: npm run make

      - name: Archive Production Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: meowterm-windows
          path: out/make/squirrel.windows/x64/*.exe
          
      - name: Archive Production Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: meowterm-macos
          path: out/make/zip/darwin/x64/*.zip

      - name: Archive Production Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: meowterm-linux
          path: |
            out/make/deb/x64/*.deb
            out/make/rpm/x64/*.rpm

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: meowterm-windows
          path: artifacts/windows

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: meowterm-macos
          path: artifacts/macos

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: meowterm-linux
          path: artifacts/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MeowTerm ${{ github.ref_name }}
          body: |
            ## 🐱 MeowTerm ${{ github.ref_name }}
            
            ### 📦 Downloads
            - Windows: meowterm-windows (exe installer)
            - macOS: meowterm-macos (zip)
            - Linux: meowterm-linux (deb/rpm)
            
            ---
            [View full changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: |
            artifacts/windows/*.exe
            artifacts/macos/*.zip
            artifacts/linux/*.deb
            artifacts/linux/*.rpm
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}